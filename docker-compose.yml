services:
  vocatio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vocatio-app
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger-ui.html"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
